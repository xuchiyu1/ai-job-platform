<!DOCTYPE html>
<html>
<head>
    <title>AI Job Prep Platform</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        textarea { width: 100%; height: 150px; margin: 10px 0; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #45a049; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; display: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>AI Job Prep Platform</h1>
    <p>Paste a job description and get a personalized skill checklist and study plan.</p>
    <textarea id="jd" placeholder="Paste the job description here..."></textarea>
    <button onclick="analyze()">Analyze JD</button>
    <div id="result"></div>

    <script>
       async function analyze() {
    const jd = document.getElementById('jd').value;
    if (!jd) { alert('Please paste a job description first!'); return; }
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').innerHTML = 'Analyzing...';
    
    const response = await fetch('/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({jd: jd})
    });
    const data = await response.json();
    
    document.getElementById('result').innerHTML = 
        '<h3>Required Skills:</h3>' + data.skills.join(', ') +
        '<h3>Study Timeline:</h3>' + data.timeline +
        '<h3>Difficulty:</h3>' + data.difficulty;
}
    </script>
</body>
</html>
